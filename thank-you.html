<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | AD DEEN Engineering Services</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <main class="section-light" style="min-height: 100vh; display: grid; place-items: center; padding: 4rem 1.5rem;">
    <div class="container" style="max-width: 760px; text-align: center;">
      <div style="background: var(--bg-white); border-radius: var(--radius-2xl); padding: 3rem; box-shadow: var(--shadow-2xl); border: 1px solid var(--border);">
        <div style="font-size: 3rem; margin-bottom: 1rem; color: var(--accent);">
          <i class="fas fa-check-circle"></i>
        </div>
        <h1 style="margin-bottom: 1rem; color: var(--primary-dark);">Thank You!</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 2rem;">
          Your message has been sent successfully. Our team at AD DEEN Engineering Services will review your inquiry and contact you shortly.
        </p>
        <a href="index.html#home" class="btn btn-primary" style="padding: 1rem 2rem;"><i class="fas fa-arrow-left"></i> Return to Home</a>
      </div>
    </div>
  </main>
</body>
</html>
